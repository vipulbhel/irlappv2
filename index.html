<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRL — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0D0810;--card:#160F1A;--rose:#E8437A;--rose2:#FF6B9D;--cream:#F5EDE8;--muted:#8A7A82;--muted2:#3A3040;--border:rgba(245,237,232,0.08)}
html,body{height:100%}
body{background:var(--bg);color:var(--cream);font-family:'DM Sans',sans-serif;min-height:100svh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden}
.amb1{position:fixed;top:-100px;right:-100px;width:400px;height:400px;background:radial-gradient(circle,rgba(232,67,122,0.1) 0%,transparent 65%);pointer-events:none;z-index:0}
.amb2{position:fixed;bottom:-80px;left:-80px;width:300px;height:300px;background:radial-gradient(circle,rgba(120,40,90,0.07) 0%,transparent 65%);pointer-events:none;z-index:0}
.card{width:100%;max-width:400px;background:var(--card);border:1px solid var(--border);border-radius:24px;padding:40px 28px;position:relative;z-index:1;animation:fadeup 0.6s ease forwards;text-align:center}
.logo{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;letter-spacing:-1.5px;margin-bottom:8px}
.logo span{color:var(--rose)}
.tagline{font-size:13px;color:var(--muted);margin-bottom:40px;font-weight:300;line-height:1.5}
.tagline b{color:var(--cream)}
.divider{display:flex;align-items:center;gap:12px;margin-bottom:28px}
.divider-line{flex:1;height:1px;background:var(--border)}
.divider-text{font-size:11px;color:var(--muted2);letter-spacing:1px;text-transform:uppercase}
.btn-google{width:100%;background:white;border:none;border-radius:13px;padding:16px 20px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;color:#1f1f1f;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:12px;transition:all 0.2s;box-shadow:0 4px 16px rgba(0,0,0,0.3);margin-bottom:16px;min-height:54px;position:relative}
.btn-google:hover{background:#f5f5f5;transform:scale(0.998)}
.btn-google:disabled{opacity:0.6;cursor:not-allowed;transform:none}
.btn-google svg{flex-shrink:0}
.btn-label{display:block}
.dots-loader{display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);gap:5px;align-items:center}
.dots-loader span{display:inline-block;width:7px;height:7px;border-radius:50%;background:#E8437A;animation:dotbounce 1.2s infinite ease-in-out}
.dots-loader span:nth-child(1){animation-delay:0s}.dots-loader span:nth-child(2){animation-delay:0.2s}.dots-loader span:nth-child(3){animation-delay:0.4s}
@keyframes dotbounce{0%,80%,100%{transform:scale(0.7);opacity:0.5}40%{transform:scale(1.1);opacity:1}}
.btn-google.loading .btn-label{opacity:0}
.btn-google.loading .dots-loader{display:flex}
.note{font-size:11px;color:var(--muted2);line-height:1.6;margin-bottom:32px}
.note a{color:var(--muted);text-decoration:underline}
.trust-strip{display:flex;justify-content:center;gap:20px;padding-top:24px;border-top:1px solid var(--border)}
.trust-item{font-size:10px;color:var(--muted2);display:flex;align-items:center;gap:4px}
.trust-item::before{content:'✓';color:var(--rose);font-weight:700}
.error-msg{display:none;background:rgba(232,67,122,0.08);border:1px solid rgba(232,67,122,0.2);border-radius:10px;padding:10px 14px;font-size:12px;color:var(--rose2);margin-bottom:16px;text-align:center;line-height:1.5}
.error-msg.show{display:block}
.page-loader{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.page-loader-logo{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;letter-spacing:-1.5px}
.page-loader-logo span{color:var(--rose)}
.page-loader-dots{display:flex;gap:6px}
.page-loader-dots span{width:8px;height:8px;border-radius:50%;background:var(--rose);animation:dotbounce 1.2s infinite ease-in-out}
.page-loader-dots span:nth-child(1){animation-delay:0s}.page-loader-dots span:nth-child(2){animation-delay:0.2s}.page-loader-dots span:nth-child(3){animation-delay:0.4s}
@keyframes fadeup{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="amb1"></div>
<div class="amb2"></div>

<!-- Loading state while checking session -->
<div class="page-loader" id="pageLoader">
  <div class="page-loader-logo">ir<span>l</span></div>
  <div class="page-loader-dots"><span></span><span></span><span></span></div>
</div>

<div class="card" id="mainCard" style="display:none">
  <div class="logo">ir<span>l</span></div>
  <p class="tagline">Dating for <b>real</b> people.<br>Verified. Voice-first. In-person.</p>
  <div class="error-msg" id="errorMsg"></div>
  <div class="divider"><div class="divider-line"></div><div class="divider-text">Get started</div><div class="divider-line"></div></div>
  <button class="btn-google" id="googleBtn" onclick="signInWithGoogle()">
    <span class="btn-label">
      <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </span>
    <div class="dots-loader"><span></span><span></span><span></span></div>
  </button>
  <p class="note">By continuing you agree to our Terms and Privacy Policy.<br>IRL is for adults 18+ in India.</p>
  <div class="trust-strip">
    <div class="trust-item">Verified only</div>
    <div class="trust-item">Safe & private</div>
    <div class="trust-item">India only</div>
  </div>
</div>

<script>
const { createClient } = window.supabase;
const SUPABASE_URL = 'https://sxpbdkamagunvktdkogw.supabase.co';
const ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN4cGJka2FtYWd1bnZrdGRrb2d3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwMDc3NDUsImV4cCI6MjA5NDU4Mzc0NX0.rTQeSH2dWSLP0IxwewvvEn3qxIbRQcCMZVjpr_0_LJ8';
const EDGE = SUPABASE_URL + '/functions/v1';

// use pkce flow for native deep link support
const db = createClient(SUPABASE_URL, ANON, {
  auth: { flowType: 'pkce' }
});

const isNative = !!(window.Capacitor?.isNativePlatform?.());

async function callEdge(fn, body){
  const { data: { session } } = await db.auth.getSession();
  const token = session?.access_token || ANON;
  const res = await fetch(EDGE+'/'+fn, {
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
    body: JSON.stringify(body)
  });
  return res.json();
}

// native: listen for deep link BEFORE anything else
if(isNative){
  window.Capacitor.Plugins.App?.addListener('appUrlOpen', async (event) => {
    console.log('appUrlOpen:', event.url);
    try {
      // close the browser
      await window.Capacitor.Plugins.Browser?.close();
      // exchange the code in the URL for a session
      const { data, error } = await db.auth.exchangeCodeForSession(event.url);
      console.log('exchangeCodeForSession:', data?.session?.user?.id, error);
      if(data?.session){
        clearTimeout(safetyTimer);
        await handleSession(data.session);
      } else {
        showLoginCard();
      }
    } catch(e){
      console.error('appUrlOpen error:', e);
      showLoginCard();
    }
  });
}

// safety timeout
const safetyTimer = setTimeout(()=>{ console.log('safety timeout'); showLoginCard(); }, 6000);

// web: use onAuthStateChange
db.auth.onAuthStateChange(async (event, session) => {
  console.log('auth event:', event, 'session:', !!session);
  if(event === 'INITIAL_SESSION'){
    clearTimeout(safetyTimer);
    if(session){ await handleSession(session); }
    else { showLoginCard(); }
  } else if(event === 'SIGNED_IN' && session){
    clearTimeout(safetyTimer);
    await handleSession(session);
  }
});

async function handleSession(session){
  console.log('handleSession:', session.user?.id);
  try {
    const token = session.access_token;
    const res = await fetch(EDGE+'/get-profile', {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
      body:JSON.stringify({})
    });
    const data = await res.json();
    console.log('get-profile:', data);
    if(data.error){ showLoginCard(); return; }
    if(!data.exists){
      const res2 = await fetch(EDGE+'/create-profile', {
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
        body:JSON.stringify({})
      });
      const created = await res2.json();
      if(created.error){ showError(created.error); showLoginCard(); return; }
      window.location.href = 'linkedin.html';
    } else {
      redirectByStatus(data.profile);
    }
  } catch(e){ console.error('handleSession error:', e); showLoginCard(); }
}

function redirectByStatus(profile){
  if(profile.status === 'approved'){ window.location.href = 'home.html'; return; }
  if(profile.status === 'rejected'){ showError('Not approved. Email hello@getirl.in'); showLoginCard(); return; }
  if(profile.review_reason === 'gender_change'){ window.location.href = 'pending.html'; return; }
  if(!profile.linkedin_verified){ window.location.href = 'linkedin.html'; return; }
  if(profile.onboarding_step < 2){ window.location.href = 'profile.html'; return; }
  window.location.href = 'pending.html';
}

async function signInWithGoogle(){
  const btn = document.getElementById('googleBtn');
  btn.classList.add('loading'); btn.disabled = true;
  try {
    if(isNative){
      // native: get OAuth URL, open in browser plugin
      const { data, error } = await db.auth.signInWithOAuth({
        provider: 'google',
        options: {
          redirectTo: 'com.getirl.app://index',
          skipBrowserRedirect: true,
          queryParams: { access_type: 'offline', prompt: 'consent' }
        }
      });
      if(error){ showError('Could not open Google.'); btn.classList.remove('loading'); btn.disabled = false; return; }
      await window.Capacitor.Plugins.Browser?.open({ url: data.url });
    } else {
      // web: normal redirect
      const { error } = await db.auth.signInWithOAuth({
        provider: 'google',
        options: {
          redirectTo: 'https://irlv2-4r5m.vercel.app/index.html',
          queryParams: { access_type: 'offline', prompt: 'consent' }
        }
      });
      if(error){ showError('Could not open Google.'); btn.classList.remove('loading'); btn.disabled = false; }
    }
  } catch(e){ showError('Unexpected error.'); btn.classList.remove('loading'); btn.disabled = false; }
}

function showLoginCard(){
  document.getElementById('pageLoader').style.display = 'none';
  document.getElementById('mainCard').style.display = 'block';
}
function showError(msg){ const e=document.getElementById('errorMsg'); e.textContent=msg; e.classList.add('show'); }
</script>
</body>
</html>
