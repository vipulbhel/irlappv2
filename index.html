<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRL — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0D0810;--card:#160F1A;--rose:#E8437A;--rose2:#FF6B9D;
  --cream:#F5EDE8;--muted:#8A7A82;--muted2:#3A3040;--border:rgba(245,237,232,0.08);
}
html,body{height:100%}
body{
  background:var(--bg);color:var(--cream);font-family:'DM Sans',sans-serif;
  min-height:100svh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:24px;
  position:relative;overflow:hidden;
}
.amb1{position:fixed;top:-100px;right:-100px;width:400px;height:400px;background:radial-gradient(circle,rgba(232,67,122,0.1) 0%,transparent 65%);pointer-events:none;z-index:0}
.amb2{position:fixed;bottom:-80px;left:-80px;width:300px;height:300px;background:radial-gradient(circle,rgba(120,40,90,0.07) 0%,transparent 65%);pointer-events:none;z-index:0}

.card{
  width:100%;max-width:400px;
  background:var(--card);border:1px solid var(--border);
  border-radius:24px;padding:36px 28px;
  position:relative;z-index:1;
  animation:fadeup 0.6s ease forwards;
}
.logo{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;letter-spacing:-1px;margin-bottom:32px;text-align:center}
.logo span{color:var(--rose)}
.card-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:700;letter-spacing:-0.5px;margin-bottom:6px;text-align:center}
.card-sub{font-size:13px;color:var(--muted);text-align:center;line-height:1.6;margin-bottom:28px;font-weight:300}

.phone-row{display:flex;gap:10px;margin-bottom:14px}
.country-code{
  background:rgba(245,237,232,0.04);border:1px solid rgba(245,237,232,0.1);
  border-radius:13px;padding:16px 14px;
  font-family:'DM Sans',sans-serif;font-size:15px;color:var(--cream);
  flex:0 0 76px;text-align:center;font-weight:500;
}
input[type="tel"]{
  background:rgba(245,237,232,0.04);border:1px solid rgba(245,237,232,0.1);
  border-radius:13px;padding:16px 18px;
  font-family:'DM Sans',sans-serif;font-size:15px;color:var(--cream);
  outline:none;width:100%;-webkit-appearance:none;
  transition:border-color 0.2s,background 0.2s;
}
input::placeholder{color:var(--muted2)}
input:focus{border-color:rgba(232,67,122,0.5);background:rgba(232,67,122,0.04)}

/* ── THREE DOTS LOADER ── */
.btn-primary{
  width:100%;background:linear-gradient(135deg,#E8437A,#C4306A);
  border:none;border-radius:13px;padding:18px;
  font-family:'Syne',sans-serif;font-size:15px;font-weight:700;
  color:white;cursor:pointer;
  transition:transform 0.15s,opacity 0.15s,box-shadow 0.2s;
  box-shadow:0 8px 28px rgba(232,67,122,0.25);
  margin-bottom:14px;
  min-height:56px;
  position:relative;
  overflow:hidden;
}
.btn-primary:hover:not(:disabled){opacity:0.9;transform:scale(0.998)}
.btn-primary:active:not(:disabled){transform:scale(0.97)}
.btn-primary:disabled{opacity:0.6;cursor:not-allowed;transform:none}

.btn-label{display:block;transition:opacity 0.15s}
.dots-loader{
  display:none;
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  gap:5px;
  align-items:center;
}
.dots-loader span{
  display:inline-block;
  width:7px;height:7px;
  border-radius:50%;
  background:white;
  animation:dotbounce 1.2s infinite ease-in-out;
}
.dots-loader span:nth-child(1){animation-delay:0s}
.dots-loader span:nth-child(2){animation-delay:0.2s}
.dots-loader span:nth-child(3){animation-delay:0.4s}
@keyframes dotbounce{
  0%,80%,100%{transform:scale(0.7);opacity:0.5}
  40%{transform:scale(1.1);opacity:1}
}

/* loading state */
.btn-primary.loading .btn-label{opacity:0}
.btn-primary.loading .dots-loader{display:flex}

.error-msg{
  display:none;background:rgba(232,67,122,0.08);
  border:1px solid rgba(232,67,122,0.2);border-radius:10px;
  padding:10px 14px;font-size:12px;color:var(--rose2);
  margin-bottom:14px;text-align:center;line-height:1.5;
}
.error-msg.show{display:block}

.note{font-size:11px;color:var(--muted2);text-align:center;line-height:1.6}
.note b{color:var(--muted)}
.trust-strip{display:flex;justify-content:center;gap:20px;margin-top:24px;padding-top:20px;border-top:1px solid var(--border)}
.trust-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted2)}
.trust-item::before{content:'✓';color:var(--rose);font-weight:700;font-size:11px}

@keyframes fadeup{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
</style>
</head>
<body>
<div class="amb1"></div>
<div class="amb2"></div>

<div class="card">
  <div class="logo">ir<span>l</span></div>
  <h1 class="card-title">Welcome to IRL</h1>
  <p class="card-sub">Enter your mobile number to get started.<br>We'll send you a verification code.</p>

  <div class="error-msg" id="errorMsg"></div>

  <div class="phone-row">
    <div class="country-code">🇮🇳 +91</div>
    <input
      type="tel" id="phoneInput"
      placeholder="10-digit number"
      maxlength="10" inputmode="numeric"
    />
  </div>

  <button class="btn-primary" id="continueBtn">
    <span class="btn-label">Continue →</span>
    <div class="dots-loader">
      <span></span><span></span><span></span>
    </div>
  </button>

  <p class="note">By continuing you agree to our <b>Terms</b> and <b>Privacy Policy.</b></p>

  <div class="trust-strip">
    <div class="trust-item">Verified only</div>
    <div class="trust-item">Safe & private</div>
    <div class="trust-item">India only</div>
  </div>
</div>

<script>
// ── Supabase init — 'db' avoids conflict with window.supabase
const { createClient } = window.supabase;
const db = createClient(
  'https://sxpbdkamagunvktdkogw.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN4cGJka2FtYWd1bnZrdGRrb2d3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwMDc3NDUsImV4cCI6MjA5NDU4Mzc0NX0.rTQeSH2dWSLP0IxwewvvEn3qxIbRQcCMZVjpr_0_LJ8'
);

const phoneInput = document.getElementById('phoneInput');
const continueBtn = document.getElementById('continueBtn');
const errorMsg   = document.getElementById('errorMsg');

// numbers only
phoneInput.addEventListener('input', function(){
  this.value = this.value.replace(/\D/g,'').slice(0,10);
  hideError();
});

// enter key
phoneInput.addEventListener('keydown', function(e){
  if(e.key === 'Enter') handleContinue();
});

// button
continueBtn.addEventListener('click', handleContinue);

async function handleContinue(){
  const phone = phoneInput.value.trim();

  // validate
  if(!phone || phone.length < 10){
    showError('Please enter a valid 10-digit mobile number.');
    phoneInput.style.animation = 'shake 0.4s ease';
    phoneInput.style.borderColor = 'rgba(232,67,122,0.7)';
    setTimeout(()=>{
      phoneInput.style.animation = '';
      phoneInput.style.borderColor = '';
    }, 500);
    return;
  }

  setLoading(true);

  try {
    // check if user already exists
    // NOTE: make sure RLS is DISABLED on profiles table in Supabase
    const { data: rows, error } = await db
      .from('profiles')
      .select('phone, onboarding_step, status')
      .eq('phone', phone)
      .limit(1);

    if(error){
      // show actual error code to help debug
      showError('DB error: ' + (error.message || error.code || JSON.stringify(error)));
      setLoading(false);
      return;
    }

    // save phone for all subsequent screens
    localStorage.setItem('irl_phone', phone);

    const existing = rows && rows.length > 0 ? rows[0] : null;

    window.location.href = 'otp.html';

  } catch(err){
    console.error('handleContinue error:', err);
    showError('Unexpected error. Please try again.');
    setLoading(false);
  }
}

function redirectReturningUser(user){
  if(user.status === 'approved'){ window.location.href = 'home.html'; return; }
  if(user.status === 'rejected'){
    showError('Your profile was not approved. Email hello@getirl.in');
    setLoading(false);
    return;
  }
  if(user.status === 'pending' && user.onboarding_step >= 2){
    window.location.href = 'pending.html'; return;
  }
  switch(user.onboarding_step){
    case 0: window.location.href = 'otp.html'; break;
    case 1: window.location.href = 'linkedin.html'; break;
    case 2: window.location.href = 'profile.html'; break;
    default: window.location.href = 'otp.html';
  }
}

function setLoading(on){
  continueBtn.classList.toggle('loading', on);
  continueBtn.disabled = on;
}
function showError(msg){
  errorMsg.textContent = msg;
  errorMsg.classList.add('show');
}
function hideError(){
  errorMsg.classList.remove('show');
}
</script>
</body>
</html>
