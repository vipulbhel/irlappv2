<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRL — Verify</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0D0810;--card:#160F1A;--rose:#E8437A;--rose2:#FF6B9D;
  --cream:#F5EDE8;--muted:#8A7A82;--muted2:#3A3040;--border:rgba(245,237,232,0.08);
}
html,body{height:100%}
body{
  background:var(--bg);color:var(--cream);font-family:'DM Sans',sans-serif;
  min-height:100svh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:24px;
  position:relative;overflow:hidden;
}
.amb1{position:fixed;top:-100px;right:-100px;width:400px;height:400px;background:radial-gradient(circle,rgba(232,67,122,0.1) 0%,transparent 65%);pointer-events:none;z-index:0}
.amb2{position:fixed;bottom:-80px;left:-80px;width:300px;height:300px;background:radial-gradient(circle,rgba(120,40,90,0.07) 0%,transparent 65%);pointer-events:none;z-index:0}

.card{
  width:100%;max-width:400px;
  background:var(--card);border:1px solid var(--border);
  border-radius:24px;padding:36px 28px;
  position:relative;z-index:1;
  animation:fadeup 0.6s ease forwards;
}
.back-btn{
  position:absolute;top:20px;left:20px;
  background:rgba(245,237,232,0.05);border:1px solid var(--border);
  border-radius:10px;padding:8px 12px;
  font-size:14px;color:var(--muted);cursor:pointer;
  transition:background 0.2s;line-height:1;border:1px solid var(--border);
}
.back-btn:hover{background:rgba(245,237,232,0.08)}
.logo{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;letter-spacing:-1px;margin-bottom:32px;text-align:center}
.logo span{color:var(--rose)}
.card-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:700;letter-spacing:-0.5px;margin-bottom:6px;text-align:center}
.card-sub{font-size:13px;color:var(--muted);text-align:center;line-height:1.6;margin-bottom:20px;font-weight:300}
.card-sub b{color:var(--cream)}

.demo-banner{
  background:rgba(245,237,232,0.04);border:1px solid var(--border);
  border-radius:10px;padding:10px 14px;
  font-size:12px;color:var(--muted);text-align:center;
  margin-bottom:20px;line-height:1.5;
}
.demo-banner b{color:var(--cream)}

.error-msg{
  display:none;background:rgba(232,67,122,0.08);
  border:1px solid rgba(232,67,122,0.2);border-radius:10px;
  padding:10px 14px;font-size:12px;color:var(--rose2);
  margin-bottom:16px;text-align:center;
}
.error-msg.show{display:block}

/* ── OTP BOXES ── */
.otp-row{
  display:flex;gap:12px;justify-content:center;
  margin-bottom:24px;
}
.otp-box{
  width:64px;height:68px;
  background:rgba(245,237,232,0.04);
  border:1.5px solid rgba(245,237,232,0.1);
  border-radius:14px;
  font-family:'Syne',sans-serif;
  font-size:26px;font-weight:700;
  color:var(--cream);text-align:center;
  outline:none;
  transition:border-color 0.15s,background 0.15s;
  caret-color:transparent;
  /* prevent iOS zoom */
  -webkit-text-size-adjust:100%;
}
.otp-box:focus{border-color:rgba(232,67,122,0.6);background:rgba(232,67,122,0.06)}
.otp-box.filled{border-color:rgba(232,67,122,0.35)}
.otp-box.err{border-color:rgba(232,67,122,0.8);animation:shake 0.4s ease}

/* ── BUTTON WITH THREE DOTS ── */
.btn-primary{
  width:100%;background:linear-gradient(135deg,#E8437A,#C4306A);
  border:none;border-radius:13px;padding:18px;
  font-family:'Syne',sans-serif;font-size:15px;font-weight:700;
  color:white;cursor:pointer;
  transition:transform 0.15s,opacity 0.15s,box-shadow 0.2s;
  box-shadow:0 8px 28px rgba(232,67,122,0.25);
  margin-bottom:16px;min-height:56px;
  position:relative;overflow:hidden;
}
.btn-primary:hover:not(:disabled){opacity:0.9;transform:scale(0.998)}
.btn-primary:active:not(:disabled){transform:scale(0.97)}
.btn-primary:disabled{opacity:0.35;cursor:not-allowed;transform:none;box-shadow:none}

.btn-label{display:block;transition:opacity 0.15s}
.dots-loader{
  display:none;position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  gap:5px;align-items:center;
}
.dots-loader span{
  display:inline-block;width:7px;height:7px;
  border-radius:50%;background:white;
  animation:dotbounce 1.2s infinite ease-in-out;
}
.dots-loader span:nth-child(1){animation-delay:0s}
.dots-loader span:nth-child(2){animation-delay:0.2s}
.dots-loader span:nth-child(3){animation-delay:0.4s}
@keyframes dotbounce{
  0%,80%,100%{transform:scale(0.7);opacity:0.5}
  40%{transform:scale(1.1);opacity:1}
}
.btn-primary.loading .btn-label{opacity:0}
.btn-primary.loading .dots-loader{display:flex}

.resend-row{text-align:center}
.resend-btn{
  background:none;border:none;color:var(--rose2);
  font-family:'DM Sans',sans-serif;font-size:13px;
  cursor:pointer;padding:4px;
}
.resend-btn:disabled{color:var(--muted2);cursor:not-allowed}
.resend-timer{font-size:13px;color:var(--muted2)}

@keyframes fadeup{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}60%{transform:translateX(6px)}}
</style>
</head>
<body>
<div class="amb1"></div>
<div class="amb2"></div>

<div class="card">
  <button class="back-btn" id="backBtn">← Back</button>
  <div class="logo">ir<span>l</span></div>

  <h1 class="card-title">Enter the code</h1>
  <p class="card-sub">Sent to <b id="phoneDisplay">+91 —</b></p>

  <div class="demo-banner">
    🔧 Demo mode &nbsp;·&nbsp; Enter <b>1234</b> to continue
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <div class="otp-row">
    <input class="otp-box" id="b0" type="tel" inputmode="numeric" maxlength="1" autocomplete="one-time-code"/>
    <input class="otp-box" id="b1" type="tel" inputmode="numeric" maxlength="1"/>
    <input class="otp-box" id="b2" type="tel" inputmode="numeric" maxlength="1"/>
    <input class="otp-box" id="b3" type="tel" inputmode="numeric" maxlength="1"/>
  </div>

  <button class="btn-primary" id="verifyBtn" disabled>
    <span class="btn-label">Verify →</span>
    <div class="dots-loader"><span></span><span></span><span></span></div>
  </button>

  <div class="resend-row">
    <button class="resend-btn" id="resendBtn" disabled>Resend code</button>
    <span class="resend-timer" id="timerLabel"> in 30s</span>
  </div>
</div>

<script>
// ── Supabase
const { createClient } = window.supabase;
const db = createClient(
  'https://sxpbdkamagunvktdkogw.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN4cGJka2FtYWd1bnZrdGRrb2d3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwMDc3NDUsImV4cCI6MjA5NDU4Mzc0NX0.rTQeSH2dWSLP0IxwewvvEn3qxIbRQcCMZVjpr_0_LJ8'
);

// ── phone
const phone = localStorage.getItem('irl_phone');
if(!phone){ window.location.href = 'index.html'; }
document.getElementById('phoneDisplay').textContent = '+91 ' + phone;
document.getElementById('backBtn').addEventListener('click', ()=> window.location.href = 'index.html');

// ── boxes
const B = ['b0','b1','b2','b3'].map(id => document.getElementById(id));
const verifyBtn = document.getElementById('verifyBtn');
const errorMsg  = document.getElementById('errorMsg');

function code(){ return B.map(b => b.value).join(''); }
function syncBtn(){ verifyBtn.disabled = code().length < 4; }
function clearErr(){ errorMsg.classList.remove('show'); B.forEach(b=>b.classList.remove('err')); }

B.forEach((box, i) => {

  box.addEventListener('keydown', function(e){
    if(e.key === 'Backspace'){
      e.preventDefault();
      if(this.value){
        this.value = '';
        this.classList.remove('filled');
      } else if(i > 0){
        B[i-1].focus();
        B[i-1].value = '';
        B[i-1].classList.remove('filled');
      }
      syncBtn();
      return;
    }
    if(e.key === 'ArrowLeft'  && i > 0){ e.preventDefault(); B[i-1].focus(); }
    if(e.key === 'ArrowRight' && i < 3){ e.preventDefault(); B[i+1].focus(); }
    if(e.key === 'Enter' && code().length === 4) verifyOTP();
  });

  // use keypress / beforeinput so we capture the digit BEFORE it lands
  box.addEventListener('beforeinput', function(e){
    if(e.data && /^\d$/.test(e.data)){
      e.preventDefault();               // stop default insertion
      this.value = e.data;              // set digit
      this.classList.add('filled');
      clearErr();
      syncBtn();
      if(i < 3){
        B[i+1].focus();
      } else {
        this.blur();
        // tiny delay so syncBtn runs first
        setTimeout(verifyOTP, 80);
      }
    }
  });

  // fallback for browsers without beforeinput
  box.addEventListener('input', function(){
    const v = this.value.replace(/\D/g,'');
    if(!v){ this.value=''; this.classList.remove('filled'); syncBtn(); return; }
    this.value = v[v.length-1];
    this.classList.add('filled');
    clearErr();
    syncBtn();
    if(i < 3) B[i+1].focus();
    else setTimeout(verifyOTP, 80);
  });

  // paste anywhere in the row
  box.addEventListener('paste', function(e){
    e.preventDefault();
    const pasted = (e.clipboardData||window.clipboardData).getData('text').replace(/\D/g,'').slice(0,4);
    if(!pasted) return;
    pasted.split('').forEach((ch, idx)=>{
      if(B[idx]){ B[idx].value=ch; B[idx].classList.add('filled'); }
    });
    B[Math.min(pasted.length-1,3)].focus();
    syncBtn();
    if(pasted.length===4) setTimeout(verifyOTP,80);
  });

  box.addEventListener('click', function(){ this.focus(); });
});

// focus first box after paint
requestAnimationFrame(()=> B[0].focus());

// ── VERIFY
async function verifyOTP(){
  const c = code();
  if(c.length < 4 || verifyBtn.disabled) return;

  // DEMO — replace with real SMS check
  if(c !== '1234'){
    errorMsg.textContent = 'Wrong code. Hint: try 1234 in demo mode.';
    errorMsg.classList.add('show');
    B.forEach(b=>b.classList.add('err'));
    setTimeout(()=>{
      B.forEach(b=>{ b.classList.remove('err'); b.value=''; b.classList.remove('filled'); });
      syncBtn();
      B[0].focus();
    }, 900);
    return;
  }

  setLoading(true);

  try {
    const { data: rows, error } = await db
      .from('profiles')
      .select('phone, onboarding_step, status, review_reason')
      .eq('phone', phone)
      .limit(1);

    if(error){
      errorMsg.textContent = 'DB error: ' + (error.message || JSON.stringify(error));
      errorMsg.classList.add('show');
      setLoading(false);
      return;
    }

    const existing = rows && rows.length > 0 ? rows[0] : null;

    if(!existing){
      // new user — create row
      const { error: insErr } = await db
        .from('profiles')
        .insert({
          phone: phone,
          onboarding_step: 0,
          status: 'pending',
          is_verified: false,
          is_active: false,
          waitlisted: false,
        });
      if(insErr){
        errorMsg.textContent = 'Insert error: ' + (insErr.message || JSON.stringify(insErr));
        errorMsg.classList.add('show');
        setLoading(false);
        return;
      }
      window.location.href = 'linkedin.html';
    } else {
      redirectByStep(existing);
    }
  } catch(err){
    console.error(err);
    errorMsg.textContent = 'Unexpected error. Try again.';
    errorMsg.classList.add('show');
    setLoading(false);
  }
}

function redirectByStep(user){
  if(user.status === 'approved'){ window.location.href = 'home.html'; return; }
  if(user.review_reason === 'gender_change'){ window.location.href = 'pending.html'; return; }
  if(user.status === 'pending' && user.onboarding_step >= 2){ window.location.href = 'pending.html'; return; }
  switch(user.onboarding_step){
    case 0: window.location.href = 'linkedin.html'; break;
    case 1: window.location.href = 'profile.html'; break;
    default: window.location.href = 'linkedin.html';
  }
}

function setLoading(on){
  verifyBtn.classList.toggle('loading', on);
  verifyBtn.disabled = on;
}

// ── RESEND TIMER
let secs = 30;
const timerEl   = document.getElementById('timerLabel');
const resendBtn = document.getElementById('resendBtn');

const cd = setInterval(()=>{
  secs--;
  if(secs <= 0){ clearInterval(cd); timerEl.textContent=''; resendBtn.disabled=false; }
  else timerEl.textContent = ' in '+secs+'s';
},1000);

resendBtn.addEventListener('click', function(){
  this.disabled = true;
  secs = 30; timerEl.textContent = ' in 30s';
  errorMsg.textContent = 'Code resent! (Demo: use 1234)';
  errorMsg.classList.add('show');
  setTimeout(()=> errorMsg.classList.remove('show'), 3000);
  const t = setInterval(()=>{
    secs--;
    if(secs<=0){ clearInterval(t); timerEl.textContent=''; resendBtn.disabled=false; }
    else timerEl.textContent=' in '+secs+'s';
  },1000);
});
</script>
</body>
</html>
